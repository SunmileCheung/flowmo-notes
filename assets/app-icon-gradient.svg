<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="226" fill="url(#iconGradient)" filter="url(#shadow)"/>
  
  <!-- 流动的书本图标 -->
  <g transform="translate(312, 362)">
    <!-- 左页 -->
    <path d="M50 20 C50 20 100 80 200 80 L200 330 C100 330 50 270 50 270 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 右页 -->
    <path d="M350 20 C350 20 300 80 200 80 L200 330 C300 330 350 270 350 270 Z" 
          fill="white" opacity="0.85"/>
    
    <!-- 流动的水滴 -->
    <circle cx="200" cy="60" r="18" fill="#4A90E2" opacity="0.7"/>
    <circle cx="180" cy="100" r="14" fill="#6C5CE7" opacity="0.6"/>
    <circle cx="220" cy="100" r="12" fill="#FF6B6B" opacity="0.6"/>
  </g>
  
  <!-- 品牌文字 -->
  <text x="512" y="850" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="2">FlowMo</text>
</svg>
