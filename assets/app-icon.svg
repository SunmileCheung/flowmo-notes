<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="226" fill="url(#brandGradient)"/>
  
  <!-- 流动的书本 -->
  <g transform="translate(262, 312)">
    <!-- 左页 -->
    <path d="M100 50 C100 50 150 100 250 100 L250 350 C150 350 100 300 100 300 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 右页 -->
    <path D="M400 50 C400 50 350 100 250 100 L250 350 C350 350 400 300 400 300 Z" 
          fill="white" opacity="0.85"/>
    
    <!-- 流动的水滴 -->
    <circle cx="250" cy="80" r="20" fill="#4A90E2" opacity="0.6"/>
    <circle cx="230" cy="120" r="15" fill="#6C5CE7" opacity="0.5"/>
    <circle cx="270" cy="120" r="12" fill="#4A90E2" opacity="0.5"/>
  </g>
  
  <!-- 品牌文字 -->
  <text x="512" y="820" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="2">FlowMo</text>
</svg>
